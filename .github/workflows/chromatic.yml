name: Chromatic

# Publishes the Storybook to Chromatic on every push and pull request so
# visual regressions are caught before merge. The first build was seeded
# locally; subsequent builds run here with CHROMATIC_PROJECT_TOKEN from
# repo secrets.
#
# Snapshot quota lives under a budget (free tier 5000 / OSS tier 7500 per
# month). A `paths-ignore` filter keeps Chromatic from spending snapshots
# on changes that cannot affect the visual output (docs, changelogs,
# changesets, dependabot config, the auto-merge workflow). None of these
# touch the published bundle or any story.
#
# Dependabot PRs continue to run Chromatic on purpose: a future PR is
# expected to re-enable TurboSnap with a content-hash fingerprint of
# `pharos-tokens`, after which a Dependabot bump that does not change the
# fingerprint will skip every snapshot anyway, and the rare bump that
# does change it (typically a pharos-tokens release) still wants a
# visual check.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/*.mdx'
      - '.changeset/**'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - '.github/dependabot.yml'
      - '.github/workflows/dependabot-auto-merge.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/*.mdx'
      - '.changeset/**'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - '.github/dependabot.yml'
      - '.github/workflows/dependabot-auto-merge.yml'

permissions:
  contents: read

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Publish Storybook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Chromatic needs full git history to detect baselines and changes.
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish to Chromatic
        uses: chromaui/action@v17
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          # Skip waiting for the visual review to finish — GitHub Checks get
          # the final status via Chromatic's own integration.
          exitOnceUploaded: true
          # When a build runs on `main`, accept any visual change the PR
          # has already approved. Prevents baseline drift: without this,
          # a baseline stays frozen at the last manually-accepted build
          # forever. If between accepted-build N and the next manually
          # accepted build N+M someone merges a PR with visual changes,
          # all subsequent PRs compare against build N — so the diff
          # piles up instead of resetting per merge. Setting
          # `autoAcceptChanges: main` says "what landed on main is the
          # new truth", which is correct as long as PRs themselves
          # cannot merge with un-reviewed Chromatic changes (enforced
          # via branch protection on this repo).
          autoAcceptChanges: main
          # TurboSnap: rebuild only the stories whose transitive dependency
          # graph in the *git tree* has changed. The historical hazard
          # (silent stale snapshots when `@code-sherpas/pharos-tokens`
          # released a new CSS without any pharos-react source file being
          # touched) is now covered by the `externals` glob below: the
          # `postinstall` script writes `.pharos-tokens.fingerprint` from
          # the resolved package contents; a pharos-tokens release that
          # changes any byte of its publish directory mutates the hash;
          # CI's `verify-fingerprint` step (ci.yml) blocks any PR whose
          # committed fingerprint disagrees with `node_modules/`. With
          # those guard rails TurboSnap can be trusted to invalidate the
          # whole baseline whenever the fingerprint moves, so stale-token
          # snapshots cannot ship.
          onlyChanged: true
          externals: |
            .pharos-tokens.fingerprint
