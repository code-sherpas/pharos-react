name: Chromatic

# Publishes the Storybook to Chromatic on every push and pull request so
# visual regressions are caught before merge. The first build was seeded
# locally; subsequent builds run here with CHROMATIC_PROJECT_TOKEN from
# repo secrets.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Publish Storybook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Chromatic needs full git history to detect baselines and changes.
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish to Chromatic
        uses: chromaui/action@v16
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          # Skip waiting for the visual review to finish — GitHub Checks get
          # the final status via Chromatic's own integration.
          exitOnceUploaded: true
          # When a build runs on `main`, accept any visual change the PR
          # has already approved. Prevents baseline drift: without this,
          # a baseline stays frozen at the last manually-accepted build
          # forever. If between accepted-build N and the next manually
          # accepted build N+M someone merges a PR with visual changes,
          # all subsequent PRs compare against build N — so the diff
          # piles up instead of resetting per merge. Setting
          # `autoAcceptChanges: main` says "what landed on main is the
          # new truth", which is correct as long as PRs themselves
          # cannot merge with un-reviewed Chromatic changes (enforced
          # via branch protection on this repo).
          autoAcceptChanges: main
          # TurboSnap (`onlyChanged: true`) is off for now. It chains
          # snapshots across builds via the previous build's baseline, and
          # can't detect content changes inside a consumed CSS package —
          # `@code-sherpas/pharos-tokens/css` is side-effect-imported from
          # `src/styles/index.css`, and its contents change with every
          # pharos-tokens release without any file tracked by git being
          # touched. Attempting to register it as `externals` doesn't help:
          # TurboSnap diffs against the git tree, and `node_modules/` is
          # not in it. The symptom: axe violations fixed upstream (e.g.
          # darkening `error.fg` to pass WCAG AA 4.5:1) never cleared
          # because old pixel snapshots were reused.
          #
          # At the current scale (~10 stories) the snapshot quota hit of a
          # full rebuild on every push is negligible. Revisit once we have
          # 50+ stories: at that point either cache the pharos-tokens
          # `dist/styles.css` content-hash into a git-tracked file so
          # TurboSnap can detect it, or use a dedicated TurboSnap-aware
          # integration.
