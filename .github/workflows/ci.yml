name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: lint + typecheck + build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm install` triggers the `postinstall` script, which regenerates
      # `.pharos-tokens.fingerprint` from the resolved `pharos-tokens`
      # contents in `node_modules/`. If the committed fingerprint disagrees
      # with reality (developer forgot to commit it after a dep bump), this
      # step fails the build and prints a precise remediation message.
      # Required for the `chromaui/action` step in chromatic.yml to trust
      # the fingerprint as a TurboSnap external.
      - name: Verify pharos-tokens fingerprint is current
        run: |
          if ! git diff --exit-code .pharos-tokens.fingerprint; then
            echo "::error file=.pharos-tokens.fingerprint::pharos-tokens fingerprint is stale. Run \`pnpm install\` locally and commit the updated .pharos-tokens.fingerprint."
            exit 1
          fi

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

  storybook-a11y:
    name: story accessibility (axe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache Playwright's browser binaries (~120 MB) keyed on the lockfile,
      # so a Chromium download only happens when the pinned Playwright
      # version actually moves. Keeps this job cheap on every other run.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      # Renders every *.stories.tsx in a real Chromium and runs axe against
      # it. Fails the check on any violation, honoring `a11y.test: 'error'`
      # in .storybook/preview.ts. Separate from `pnpm test` (unit/jsdom) so
      # the release workflow stays browser-free.
      - name: Story accessibility tests
        run: pnpm test:storybook

  consumer-e2e:
    name: consumer harness (playwright e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        run: pnpm --filter @examples/saas-demo exec playwright install --with-deps chromium

      # Build the library to dist/ (the consumer contract), then the SaaS demo
      # that consumes it via `workspace:*` (resolves to dist/) + styles.css +
      # tokens/css. Playwright then serves the built demo (vite preview) and
      # drives the real user flows. This gates PRs on the publish contract +
      # composition — the layer unit/Storybook/Chromatic can't see. Separate
      # from `pnpm test`; release.yml stays browser-free.
      - name: Build library (dist/ = the consumer contract)
        run: pnpm build

      - name: Build demo
        run: pnpm --filter @examples/saas-demo build

      - name: Run consumer e2e (Playwright)
        run: pnpm --filter @examples/saas-demo test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: examples/saas-demo/playwright-report
          retention-days: 7

  rsc-consumer:
    name: rsc consumer (next build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the library to dist/ (the consumer contract), then `next build`
      # the minimal Next.js App Router consumer. It renders the stateless atoms
      # in a Server Component and the client atoms behind a `"use client"`
      # boundary, so a successful prerender proves the per-component RSC
      # directives (#80) hold — the boundary layer the Vite saas-demo harness
      # cannot see. Browser-free; PR-gating; release.yml stays untouched.
      - name: Build library (dist/ = the consumer contract)
        run: pnpm build

      - name: Build RSC consumer (next build = the RSC regression net)
        run: pnpm --filter @examples/next-rsc build
